# MO Agent lint gate.
# Pyflakes (F) catches the real, runtime-relevant problems — undefined names,
# unused imports, f-string placeholder mistakes — without drowning in style noise.
# Enforce locally/CI with: `python -m ruff check .`
line-length = 120
target-version = "py310"
extend-exclude = ["tmp", "logs", "memory", ".omx", "docs", "devmode", "personal"]

[lint]
select = ["F", "E9"]  # pyflakes + syntax errors
